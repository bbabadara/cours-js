<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cours JavaScript - Apprentissage Progressif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        secondary: '#6366f1'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen transition-colors">
    
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 z-40 flex items-center justify-between px-4">
        <div class="flex items-center gap-4">
            <button id="menuBtn" class="md:hidden p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="text-xl font-bold text-primary"><i class="fab fa-js mr-2"></i>JS Cours</h1>
        </div>
        
        <!-- Search -->
        <div class="hidden md:block relative">
            <input type="text" id="searchInput" placeholder="Rechercher..." 
                class="w-64 px-4 py-2 pl-10 bg-gray-100 dark:bg-gray-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <div id="searchResults" class="hidden absolute top-full left-0 w-full mt-2 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 max-h-60 overflow-y-auto">
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="text-sm text-gray-500 hidden sm:block">
                <span id="progressText">0%</span> terminé
            </div>
            <button id="themeToggle" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:inline"></i>
            </button>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="fixed top-16 left-0 right-0 h-1 bg-gray-200 dark:bg-gray-700 z-30">
        <div id="progressBar" class="progress-bar h-full bg-primary" style="width: 0%"></div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar fixed left-0 top-[65px] h-[calc(100vh-65px)] w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 overflow-y-auto z-40">
        <div class="p-4">
            <div class="mb-4">
                <div class="text-xs text-gray-500 mb-2">Progression</div>
                <div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                    <div id="sidebarProgress" class="h-full bg-primary transition-all" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <nav class="p-2" id="lessonNav">
            <!-- Navigation buttons generated by JavaScript -->
        </nav>
        
        <div class="p-4 mt-4 border-t border-gray-200 dark:border-gray-700">
            <button id="resetProgress" class="w-full px-3 py-2 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded">
                <i class="fas fa-redo mr-2"></i>Réinitialiser
            </button>
        </div>
    </aside>

    <!-- Overlay mobile -->
    <div id="overlay" class="fixed inset-0 bg-black/50 z-30 hidden" onclick="toggleSidebar()"></div>

    <!-- Main Content -->
    <main class="ml-64 pt-[73px] p-4 md:p-8">
        <div class="max-w-4xl mx-auto lesson-container">
            <!-- Lesson content will be rendered dynamically -->
        </div>

        <!-- Console Output -->
        <div class="mt-8 pt-8 border-t border-gray-200 dark:border-gray-700">
            <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i class="fas fa-terminal text-gray-400"></i>
                Console
            </h3>
            <div id="consoleOutput" class="bg-gray-950 p-4 rounded-lg font-mono text-sm min-h-[100px] text-gray-300">
                <span class="text-gray-500">Les résultats de votre code apparaîtront ici...</span>
            </div>
        </div>

        <!-- Navigation Buttons -->
        <div class="flex justify-between mt-8">
            <button id="prevBtn" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded-lg opacity-50" disabled>
                <i class="fas fa-arrow-left mr-2"></i>Précédent
            </button>
            <button id="nextBtn" class="px-4 py-2 bg-primary hover:bg-emerald-600 text-white rounded-lg">
                Suivant<i class="fas fa-arrow-right ml-2"></i>
            </button>
        </div>
    </main>

    <!-- Application JavaScript -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
