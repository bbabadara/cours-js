<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cours JavaScript - Apprentissage Progressif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        secondary: '#6366f1'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        pre, code { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen">
    
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 z-40 flex items-center justify-between px-4">
        <div class="flex items-center gap-4">
            <button id="menuBtn" class="md:hidden p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="text-xl font-bold text-primary"><i class="fab fa-js mr-2"></i>JS Cours</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-sm text-gray-500 hidden sm:block">
                <span id="progressText">0%</span> terminé
            </div>
            <button id="themeToggle" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:inline"></i>
            </button>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="fixed top-16 left-0 right-0 h-1 bg-gray-200 dark:bg-gray-700 z-30">
        <div id="progressBar" class="h-full bg-primary transition-all" style="width: 0%"></div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-[65px] h-[calc(100vh-65px)] w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 overflow-y-auto z-40 p-4">
        <div class="text-xs text-gray-500 mb-2">Progression</div>
        <div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full mb-4">
            <div id="sidebarProgress" class="h-full bg-primary rounded-full" style="width: 0%"></div>
        </div>
        <nav id="lessonNav"></nav>
        <button id="resetProgress" class="w-full mt-4 px-3 py-2 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded">
            <i class="fas fa-redo mr-2"></i>Réinitialiser
        </button>
    </aside>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

    <!-- Main Content -->
    <main class="ml-64 pt-20 p-4 md:p-8">
        <div class="max-w-4xl mx-auto">
            <button id="prevBtn" class="mb-4 px-4 py-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded-lg opacity-50" disabled>
                <i class="fas fa-arrow-left mr-2"></i>Précédent
            </button>
            <button id="nextBtn" class="mb-4 ml-2 px-4 py-2 bg-primary hover:bg-emerald-600 text-white rounded-lg">
                Suivant<i class="fas fa-arrow-right ml-2"></i>
            </button>
            
            <div id="lessonContainer"></div>

            <!-- Console -->
            <div class="mt-8 pt-8 border-t border-gray-200 dark:border-gray-700">
                <h3 class="text-lg font-semibold mb-4"><i class="fas fa-terminal mr-2"></i>Console</h3>
                <div id="consoleOutput" class="bg-gray-950 p-4 rounded-lg font-mono text-sm min-h-[100px] text-gray-300">
                    <span class="text-gray-500">Les résultats apparaîtront ici...</span>
                </div>
            </div>
        </div>
    </main>

    <script>
// ===== LEÇONS =====
var LESSONS = [
{
    id: 'intro',
    title: 'Introduction',
    content: '<h2 class="text-3xl font-bold mb-4">Introduction à JavaScript</h2><p class="mb-4">JavaScript est un langage de programmation interprété, exécuté directement par le navigateur.</p><div class="bg-blue-50 dark:bg-blue-900/30 p-4 rounded-lg mb-4"><h3 class="font-semibold mb-2">console.log()</h3><p>Affiche un message dans la console.</p></div><button class="run-btn mt-2 px-3 py-1 bg-primary rounded" data-code="console.log(Hello World!)">Exécuter</button>',
    quiz: [{q: 'Quelle fonction affiche un message?', o: ['console.log()', 'print()', 'echo()'], a: 'console.log()'}]
},
{
    id: 'variables',
    title: 'Variables',
    content: '<h2 class="text-3xl font-bold mb-4">Les Variables</h2><p class="mb-4"><code class="text-yellow-500">let</code> = variable modifiable</p><p class="mb-4"><code class="text-yellow-500">const</code> = constante</p><button class="run-btn mt-2 px-3 py-1 bg-primary rounded" data-code="let nom = Alice; console.log(nom); const PI = 3.14; console.log(PI);">Exécuter</button>',
    quiz: [{q: 'Différence let/const?', o: ['let modifiable', 'const plus rapide'], a: 'let modifiable'}]
},
{
    id: 'types',
    title: 'Types',
    content: '<h2 class="text-3xl font-bold mb-4">Types de données</h2><p class="mb-2">String: <code class="text-yellow-500">"texte"</code></p><p class="mb-2">Number: <code class="text-yellow-500">42, 3.14</code></p><p class="mb-2">Boolean: <code class="text-yellow-500">true, false</code></p><button class="run-btn mt-2 px-3 py-1 bg-primary rounded" data-code="console.log(typeof 42); console.log(typeof bonjour); console.log(typeof true);">Exécuter</button>',
    quiz: [{q: 'Type de "42"?', o: ['string', 'number', 'boolean'], a: 'string'}]
},
{
    id: 'conditions',
    title: 'Conditions',
    content: '<h2 class="text-3xl font-bold mb-4">Conditions</h2><pre class="bg-gray-800 p-3 rounded mb-4">if (age >= 18) {\n  console.log("majeur");\n}</pre><button class="run-btn mt-2 px-3 py-1 bg-primary rounded" data-code="let age = 18; if(age >= 18){console.log(Majeur)}">Exécuter</button>',
    quiz: [{q: 'Égal strict?', o: ['==', '===', '='], a: '==='}]
},
{
    id: 'boucles',
    title: 'Boucles',
    content: '<h2 class="text-3xl font-bold mb-4">Boucles</h2><pre class="bg-gray-800 p-3 rounded mb-4">for (let i = 0; i < 3; i++) {\n  console.log(i);\n}</pre><button class="run-btn mt-2 px-3 py-1 bg-primary rounded" data-code="for(let i=0;i<3;i++){console.log(i)}">Exécuter</button>',
    quiz: [{q: 'Boucle minimale?', o: ['for', 'while', 'do...while'], a: 'do...while'}]
},
{
    id: 'fonctions',
    title: 'Fonctions',
    content: '<h2 class="text-3xl font-bold mb-4">Fonctions</h2><pre class="bg-gray-800 p-3 rounded mb-4">function saluer(nom) {\n  return "Bonjour " + nom;\n}</pre><button class="run-btn mt-2 px-3 py-1 bg-primary rounded" data-code="function saluer(nom){return Bonjour +nom} console.log(saler(Alice));">Exécuter</button>',
    quiz: [{q: 'Arrow function?', o: ['=>', 'function=>', '=>function'], a: '=>'}]
},
{
    id: 'tableaux',
    title: 'Tableaux',
    content: '<h2 class="text-3xl font-bold mb-4">Tableaux</h2><pre class="bg-gray-800 p-3 rounded mb-4">let arr = [1, 2, 3];\narr.push(4);</pre><button class="run-btn mt-2 px-3 py-1 bg-primary rounded" data-code="let arr = [1,2,3]; arr.push(4); console.log(arr); console.log(arr.map(x => x*2));">Exécuter</button>',
    quiz: [{q: 'Ajouter à la fin?', o: ['push()', 'pop()', 'shift()'], a: 'push()'}]
},
{
    id: 'objets',
    title: 'Objets',
    content: '<h2 class="text-3xl font-bold mb-4">Objets</h2><pre class="bg-gray-800 p-3 rounded mb-4">let personne = {\n  nom: "Alice",\n  age: 25\n};</pre><button class="run-btn mt-2 px-3 py-1 bg-primary rounded" data-code="let personne = {nom:Alice, age:25}; console.log(personne.nom); console.log(personne[age]);">Exécuter</button>',
    quiz: [{q: 'Accéder à nom?', o: ['objet.nom', 'objet[nom]', 'les deux'], a: 'les deux'}]
},
{
    id: 'dom',
    title: 'DOM',
    content: '<h2 class="text-3xl font-bold mb-4">DOM</h2><p class="mb-2">getElementById("id")</p><p class="mb-2">querySelector(".classe")</p><p class="mb-2">innerHTML, style.color</p>',
    quiz: [{q: 'Sélectionner par id?', o: ['getElementById', 'getById', 'query'], a: 'getElementById'}]
},
{
    id: 'events',
    title: 'Événements',
    content: '<h2 class="text-3xl font-bold mb-4">Événements</h2><pre class="bg-gray-800 p-3 rounded mb-4">element.addEventListener("click", function() {\n  console.log("cliqué!");\n});</pre><p class="mt-4">Types: click, mouseover, keydown, submit, focus</p>',
    quiz: [{q: 'Écouter un événement?', o: ['addEventListener', 'onClick', 'listen'], a: 'addEventListener'}]
},
{
    id: 'formulaires',
    title: 'Formulaires',
    content: '<h2 class="text-3xl font-bold mb-4">Formulaires</h2><p class="mb-2">submit: soumission</p><p class="mb-2">input: modification</p><p class="mb-2">e.preventDefault()</p>',
    quiz: [{q: 'Événement soumission?', o: ['submit', 'send', 'post'], a: 'submit'}]
},
{
    id: 'localstorage',
    title: 'localStorage',
    content: '<h2 class="text-3xl font-bold mb-4">localStorage</h2><p class="mb-2">setItem("clé", "valeur")</p><p class="mb-2">getItem("clé")</p><p class="mb-2">Données persistantes</p><button class="run-btn mt-2 px-3 py-1 bg-primary rounded" data-code="localStorage.setItem(nom,Alice); console.log(localStorage.getItem(nom));">Exécuter</button>',
    quiz: [{q: 'Sauvegarder?', o: ['setItem()', 'save()', 'write()'], a: 'setItem()'}]
},
{
    id: 'sessionstorage',
    title: 'sessionStorage',
    content: '<h2 class="text-3xl font-bold mb-4">sessionStorage</h2><p>Identique à localStorage mais effacé à la fermeture de l\'onglet.</p>',
    quiz: [{q: 'Quand effacé?', o: ['Fermeture onglet', 'Jamais'], a: 'Fermeture onglet'}]
},
{
    id: 'poo',
    title: 'POO',
    content: '<h2 class="text-3xl font-bold mb-4">Programmation Orientée Objet</h2><pre class="bg-gray-800 p-3 rounded mb-4">class Personne {\n  constructor(nom) {\n    this.nom = nom;\n  }\n}</pre><button class="run-btn mt-2 px-3 py-1 bg-primary rounded" data-code="class Pessoa{constructor(nom){this.nom=nom}ola(){return Olá+this.nom}} const p=new Pessoa(João); console.log(p.ola());">Exécuter</button>',
    quiz: [{q: 'Héritage?', o: ['extends', 'inherits'], a: 'extends'}]
},
{
    id: 'fetch',
    title: 'Fetch API',
    content: '<h2 class="text-3xl font-bold mb-4">Fetch API</h2><pre class="bg-gray-800 p-3 rounded mb-4">fetch(url).then(r => r.json())</pre><p class="mt-4">Requêtes HTTP</p>',
    quiz: [{q: 'Convertir JSON?', o: ['response.json()', 'JSON.parse()'], a: 'response.json()'}]
},
{
    id: 'async',
    title: 'Async/Await',
    content: '<h2 class="text-3xl font-bold mb-4">Async/Await</h2><pre class="bg-gray-800 p-3 rounded mb-4">async function load() {\n  const data = await fetch(url);\n}</pre><button class="run-btn mt-2 px-3 py-1 bg-primary rounded" data-code="async function test(){return{donnees:Test}} test().then(r=>console.log(r));">Exécuter</button>',
    quiz: [{q: 'Attendre?', o: ['await', 'then', 'wait'], a: 'await'}]
}
];

// ===== STATE =====
var state = {
    currentIndex: 0,
    completed: []
};

var TOTAL = LESSONS.length;

// ===== INIT =====
window.onload = function() {
    console.log("Initialisation...");
    try {
        init();
    } catch(e) {
        console.log("Erreur: " + e.message);
    }
};

function init() {
    // Theme toggle
    document.getElementById('themeToggle').onclick = function() {
        document.documentElement.classList.toggle('dark');
    };
    
    // Navigation
    document.getElementById('lessonNav').onclick = function(e) {
        var btn = e.target.closest('button');
        if(btn) {
            goToLesson(parseInt(btn.dataset.index));
        }
    };
    
    document.getElementById('prevBtn').onclick = function() {
        if(state.currentIndex > 0) goToLesson(state.currentIndex - 1);
    };
    
    document.getElementById('nextBtn').onclick = function() {
        markCompleted();
        if(state.currentIndex < TOTAL - 1) goToLesson(state.currentIndex + 1);
    };
    
    document.getElementById('resetProgress').onclick = function() {
        if(confirm('Réinitialiser la progression?')) {
            state.completed = [];
            state.currentIndex = 0;
            renderSidebar();
            renderLesson();
            updateProgress();
        }
    };
    
    // Mobile menu
    document.getElementById('menuBtn').onclick = function() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('hidden');
    };
    
    document.getElementById('overlay').onclick = function() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.add('hidden');
    };
    
    // Load state
    var saved = localStorage.getItem('js-course-progress');
    if(saved) state.completed = JSON.parse(saved);
    
    var savedLesson = localStorage.getItem('js-course-current');
    if(savedLesson) state.currentIndex = parseInt(savedLesson);
    
    renderSidebar();
    renderLesson();
    updateProgress();
    console.log("Cours chargé! Leçon " + (state.currentIndex + 1) + " sur " + TOTAL);
}

function renderSidebar() {
    var nav = document.getElementById('lessonNav');
    var html = '';
    
    for(var i = 0; i < TOTAL; i++) {
        var lesson = LESSONS[i];
        var isCompleted = state.completed.indexOf(i) > -1;
        var isActive = i === state.currentIndex;
        
        html += '<button data-index="' + i + '" class="w-full text-left px-3 py-2 rounded mb-1 flex items-center justify-between ';
        if(isActive) {
            html += 'bg-primary text-white';
        } else {
            html += 'hover:bg-gray-100 dark:hover:bg-gray-700';
        }
        html += '">';
        
        var num = String(i + 1).padStart(2, '0');
        html += '<span><span class="text-primary' + (isActive ? ' text-white' : '') + '">' + num + '.</span> ' + lesson.title + '</span>';
        
        if(isCompleted) {
            html += '<i class="fas fa-check-circle text-primary"></i>';
        }
        
        html += '</button>';
    }
    
    nav.innerHTML = html;
}

function renderLesson() {
    var lesson = LESSONS[state.currentIndex];
    var container = document.getElementById('lessonContainer');
    
    var html = '<div class="mb-8">';
    html += '<span class="text-primary text-sm font-medium">' + lesson.number + '/' + TOTAL + '</span>';
    html += '<h2 class="text-3xl font-bold mt-2 mb-4">' + lesson.title + '</h2>';
    html += '</div>';
    
    html += lesson.content;
    
    // Quiz
    if(lesson.quiz && lesson.quiz.length > 0) {
        html += '<div class="mt-8 p-4 bg-gray-800 rounded-lg">';
        html += '<h3 class="text-xl font-semibold mb-4"><i class="fas fa-question-circle mr-2"></i>Quiz</h3>';
        
        for(var q = 0; q < lesson.quiz.length; q++) {
            var quiz = lesson.quiz[q];
            html += '<div class="mb-4" data-quiz="' + q + '">';
            html += '<p class="font-medium mb-2">' + quiz.q + '</p>';
            
            for(var o = 0; o < quiz.o.length; o++) {
                var opt = quiz.o[o];
                html += '<button class="quiz-btn w-full text-left px-4 py-2 border border-gray-600 rounded mb-1 hover:bg-gray-700" data-answer="' + opt + '" data-correct="' + quiz.a + '">' + opt + '</button>';
            }
            
            html += '</div>';
        }
        html += '</div>';
    }
    
    container.innerHTML = html;
    
    // Run buttons
    var runBtns = container.querySelectorAll('.run-btn');
    for(var i = 0; i < runBtns.length; i++) {
        runBtns[i].onclick = function() {
            executeCode(this.dataset.code);
        };
    }
    
    // Quiz buttons
    var quizBtns = container.querySelectorAll('.quiz-btn');
    for(var i = 0; i < quizBtns.length; i++) {
        quizBtns[i].onclick = function() {
            var isCorrect = this.dataset.answer === this.dataset.correct;
            this.classList.remove('border-gray-600');
            if(isCorrect) {
                this.classList.add('bg-green-600', 'border-green-600');
            } else {
                this.classList.add('bg-red-600', 'border-red-600');
            }
        };
    }
    
    // Update nav buttons
    document.getElementById('prevBtn').disabled = state.currentIndex === 0;
    document.getElementById('prevBtn').classList.toggle('opacity-50', state.currentIndex === 0);
    document.getElementById('nextBtn').disabled = state.currentIndex === TOTAL - 1;
    document.getElementById('nextBtn').classList.toggle('opacity-50', state.currentIndex === TOTAL - 1);
    
    window.scrollTo(0, 0);
}

function goToLesson(index) {
    if(index < 0 || index >= TOTAL) return;
    state.currentIndex = index;
    localStorage.setItem('js-course-current', index);
    renderLesson();
}

function markCompleted() {
    if(state.completed.indexOf(state.currentIndex) === -1) {
        state.completed.push(state.currentIndex);
        localStorage.setItem('js-course-progress', JSON.stringify(state.completed));
        renderSidebar();
        updateProgress();
    }
}

function updateProgress() {
    var progress = (state.completed.length / TOTAL) * 100;
    document.getElementById('progressBar').style.width = progress + '%';
    document.getElementById('sidebarProgress').style.width = progress + '%';
    document.getElementById('progressText').textContent = Math.round(progress) + '%';
}

function executeCode(code) {
    var output = document.getElementById('consoleOutput');
    output.innerHTML = '';
    
    try {
        var logs = [];
        var origLog = console.log;
        console.log = function() {
            var args = [];
            for(var i = 0; i < arguments.length; i++) {
                args.push(String(arguments[i]));
            }
            logs.push(args.join(' '));
        };
        
        eval(code);
        console.log = origLog;
        
        if(logs.length > 0) {
            output.innerHTML = logs.join('<br>');
        } else {
            output.innerHTML = '<span class="text-gray-500">Code exécuté</span>';
        }
    } catch(e) {
        output.innerHTML = '<span class="text-red-500">Erreur: ' + e.message + '</span>';
    }
}

console.log("JavaScript chargé!");
    </script>
</body>
</html>
